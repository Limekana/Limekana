name: Generate contribution snake

on:
  # regenerate a few times a day so the snake stays current
  schedule:
    - cron: "0 */12 * * *"
  # run whenever main changes
  push:
    branches:
      - main
  # allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate the snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=#a3e635&color_dots=#ebf5e0,#c6e89a,#8fce4f,#5aa832,#a3e635
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#a3e635&color_dots=#0d1117,#1c3a1c,#2f7a2f,#57c257,#a3e635

      - name: Push the SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
