<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" fill="none" role="img" aria-label="Limecore — Building the Nexus OS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1410"/>
      <stop offset="0.55" stop-color="#0a0f0d"/>
      <stop offset="1" stop-color="#070b09"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9f99d"/>
      <stop offset="0.5" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#a3e635" stop-opacity="0.28"/>
      <stop offset="0.4" stop-color="#a3e635" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#1c2a20" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1200" height="330" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="330" rx="20" fill="url(#grid)" opacity="0.6"/>
  <rect width="1200" height="330" rx="20" fill="url(#glow)"/>
  <rect x="1" y="1" width="1198" height="328" rx="19" fill="none" stroke="#233a29" stroke-width="1.5"/>

  <!-- heartbeat / strength waveform, nods to limelog -->
  <path d="M0 250 H900 l22 -46 l24 96 l26 -150 l24 100 l20 0 H1200"
        fill="none" stroke="url(#lime)" stroke-width="2" stroke-linejoin="round"
        stroke-linecap="round" opacity="0.35" filter="url(#soft)"/>

  <!-- wordmark -->
  <g transform="translate(70,118)">
    <text x="0" y="0" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="88" font-weight="800" letter-spacing="-3" fill="url(#lime)">LIMECORE<tspan dx="16" fill="#a3e635">|<animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" repeatCount="indefinite"/></tspan></text>
    <text x="4" y="46" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="27" font-weight="500" fill="#cbe8b0">Building the Nexus OS — one module at a time.</text>
    <text x="6" y="88" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace"
          font-size="16" letter-spacing="1" fill="#7fa06a">~/ Helsinki, FI  ·  indie dev  ·  TypeScript · React · Supabase · Python</text>
  </g>

  <!-- status chip -->
  <g transform="translate(980,54)">
    <rect x="0" y="0" width="150" height="34" rx="17" fill="#0f1a12" stroke="#2c4a30" stroke-width="1"/>
    <circle cx="24" cy="17" r="6" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="22" font-family="ui-monospace, Menlo, Consolas, monospace"
          font-size="14" fill="#a7d18a">shipping</text>
  </g>

  <!-- sweeping scan glow -->
  <rect x="-160" y="0" width="160" height="330" fill="#a3e635" opacity="0.05">
    <animate attributeName="x" values="-160;1200" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
